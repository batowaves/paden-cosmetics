<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ürün — Paden Cosmetics</title>
  <meta name="description" content="Paden Cosmetics ürün detayı">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24' fill='%23c41e3a'>P</text></svg>">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loader" id="loader">
    <div class="loader-cherry" id="loaderCherry">
      <svg viewBox="0 0 120 140" width="120" height="140" class="cherry-svg">
        <path d="M60 10 Q55 40 52 60" stroke="#2d5a1e" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="68" cy="28" rx="14" ry="7" fill="#3a7a28" transform="rotate(-30 68 28)"/>
        <circle cx="52" cy="82" r="28" fill="#8b1528" class="cherry-body"/>
        <ellipse cx="42" cy="72" rx="8" ry="6" fill="rgba(255,255,255,0.18)" transform="rotate(-20 42 72)"/>
        <circle cx="78" cy="76" r="0" fill="#0a0a0a"><animate attributeName="r" from="0" to="18" dur="0.4s" begin="0.8s" fill="freeze"/></circle>
        <circle cx="70" cy="68" r="0" fill="#0a0a0a"><animate attributeName="r" from="0" to="6" dur="0.3s" begin="0.85s" fill="freeze"/></circle>
        <circle cx="72" cy="84" r="0" fill="#0a0a0a"><animate attributeName="r" from="0" to="5" dur="0.3s" begin="0.9s" fill="freeze"/></circle>
        <circle cx="72" cy="76" r="0" fill="#c41e3a"><animate attributeName="r" from="0" to="10" dur="0.35s" begin="0.82s" fill="freeze"/></circle>
      </svg>
      <div class="loader-text font-display">paden<span>.</span></div>
    </div>
  </div>

  <!-- Announcement Bar -->
  <div class="announce-bar">
    <span>Tüm siparişlerde ücretsiz kargo &nbsp;&bull;&nbsp; %100 Vegan &amp; Cruelty-Free &#127826;</span>
  </div>

  <!-- Header -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="/" class="logo">paden<span>.</span></a>
      <nav class="nav-links" id="navLinks">
        <a href="/#products">Ürünler</a>
        <a href="/#story">Hakkımızda</a>
        <a href="/#contact">İletişim</a>
        <a href="https://www.shopier.com/padenscosmetics" target="_blank" rel="noopener">Shopier</a>
      </nav>
      <div class="header-actions">
        <button class="cart-btn" id="cartToggle">
          Sepet <span class="cart-count" id="cartCount"></span>
        </button>
        <button class="menu-toggle" id="menuToggle" aria-label="Menü">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Product Detail -->
  <div class="product-detail">
    <div class="product-detail-grid" id="productDetail">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Cart Drawer -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <h3>Sepetiniz</h3>
      <button class="cart-close" id="cartClose">&times;</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">Sepetiniz boş</div>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Toplam</span>
        <span class="cart-total-amount" id="cartTotal">&#8378;0</span>
      </div>
      <a href="https://www.shopier.com/padenscosmetics" target="_blank" class="cart-checkout-btn">Shopier'de Satın Al</a>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
