<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ürün — Paden Cosmetics</title>
  <meta name="description" content="Paden Cosmetics ürün detayı">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24' fill='%23c41e3a'>P</text></svg>">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loader" id="loader">
    <div class="loader-inner">
      <div class="loader-glow"></div>
      <svg viewBox="0 0 180 160" width="180" height="160" class="cherry-svg">
        <defs>
          <radialGradient id="cherryGrad" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#9a1a2e"/>
            <stop offset="40%" stop-color="#701222"/>
            <stop offset="100%" stop-color="#3d0812"/>
          </radialGradient>
          <radialGradient id="cherryGrad2" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#8a1628"/>
            <stop offset="40%" stop-color="#64101e"/>
            <stop offset="100%" stop-color="#350710"/>
          </radialGradient>
        </defs>
        <path d="M88 12 Q82 35 68 62" stroke="#3d6b2a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.1s" fill="freeze"/></path>
        <path d="M88 12 Q96 38 112 58" stroke="#3d6b2a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.15s" fill="freeze"/></path>
        <path d="M86 14 Q96 6 108 10 Q100 18 88 16Z" fill="#4a8a34" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/></path>
        <path d="M92 12 Q98 9 104 11" stroke="#5aa042" stroke-width="0.8" fill="none" opacity="0"><animate attributeName="opacity" from="0" to="0.6" dur="0.3s" begin="0.25s" fill="freeze"/></path>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/><circle cx="65" cy="95" r="32" fill="url(#cherryGrad)"/><ellipse cx="52" cy="82" rx="10" ry="7" fill="rgba(255,255,255,0.15)" transform="rotate(-25 52 82)"/><ellipse cx="50" cy="79" rx="4" ry="3" fill="rgba(255,255,255,0.25)" transform="rotate(-25 50 79)"/></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.4s" fill="freeze"/><circle cx="115" cy="90" r="30" fill="url(#cherryGrad2)"/><ellipse cx="103" cy="78" rx="9" ry="6" fill="rgba(255,255,255,0.13)" transform="rotate(-25 103 78)"/><ellipse cx="101" cy="76" rx="3.5" ry="2.5" fill="rgba(255,255,255,0.22)" transform="rotate(-25 101 76)"/></g>
        <circle cx="142" cy="84" r="0" fill="#0a0a0a"><animate attributeName="r" from="0" to="17" dur="0.3s" begin="1.2s" fill="freeze"/></circle>
        <circle cx="136" cy="74" r="0" fill="#0a0a0a"><animate attributeName="r" from="0" to="5" dur="0.2s" begin="1.25s" fill="freeze"/></circle>
        <circle cx="138" cy="94" r="0" fill="#0a0a0a"><animate attributeName="r" from="0" to="4.5" dur="0.2s" begin="1.28s" fill="freeze"/></circle>
        <circle cx="134" cy="84" r="0" fill="#b82040"><animate attributeName="r" from="0" to="9" dur="0.25s" begin="1.22s" fill="freeze"/></circle>
        <circle cx="140" cy="100" r="0" fill="#c41e3a" opacity="0.7"><animate attributeName="r" from="0" to="2.5" dur="0.3s" begin="1.5s" fill="freeze"/><animate attributeName="cy" from="100" to="120" dur="0.8s" begin="1.5s" fill="freeze"/><animate attributeName="opacity" from="0.7" to="0" dur="0.8s" begin="1.5s" fill="freeze"/></circle>
      </svg>
      <div class="loader-brand">
        <div class="loader-text font-display">paden<span>.</span></div>
        <div class="loader-tagline">Bugün yine çok güzelsin</div>
      </div>
      <div class="loader-progress"><div class="loader-progress-bar"></div></div>
    </div>
  </div>

  <!-- Announcement Bar -->
  <div class="announce-bar">
    <span>Tüm siparişlerde ücretsiz kargo &nbsp;&bull;&nbsp; %100 Vegan &amp; Cruelty-Free &#127826;</span>
  </div>

  <!-- Header -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="/" class="logo">paden<span>.</span></a>
      <nav class="nav-links" id="navLinks">
        <a href="/#products">Ürünler</a>
        <a href="/#story">Hakkımızda</a>
        <a href="/#contact">İletişim</a>
        <a href="https://www.shopier.com/padenscosmetics" target="_blank" rel="noopener">Shopier</a>
      </nav>
      <div class="header-actions">
        <button class="cart-btn" id="cartToggle">
          Sepet <span class="cart-count" id="cartCount"></span>
        </button>
        <button class="menu-toggle" id="menuToggle" aria-label="Menü">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Product Detail -->
  <div class="product-detail">
    <div class="product-detail-grid" id="productDetail">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Cart Drawer -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <h3>Sepetiniz</h3>
      <button class="cart-close" id="cartClose">&times;</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">Sepetiniz boş</div>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Toplam</span>
        <span class="cart-total-amount" id="cartTotal">&#8378;0</span>
      </div>
      <a href="https://www.shopier.com/padenscosmetics" target="_blank" class="cart-checkout-btn">Shopier'de Satın Al</a>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
